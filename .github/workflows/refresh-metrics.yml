name: Refresh growth metrics

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh metrics.json
        env:
          # Instagram (Graph API): one token can cover every Business/Creator account
          # the token's owner admins. Each account also needs its numeric user ID.
          IG_ACCESS_TOKEN:              ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID_OUTCURVEHEALTH:    ${{ secrets.IG_USER_ID_OUTCURVEHEALTH }}
          IG_USER_ID_RAREFORM030:       ${{ secrets.IG_USER_ID_RAREFORM030 }}
          IG_USER_ID_STODDYCAREY:       ${{ secrets.IG_USER_ID_STODDYCAREY }}

          # TikTok (Display API): each account has its own OAuth user token.
          TT_TOKEN_OUTCURVEHEALTH:      ${{ secrets.TT_TOKEN_OUTCURVEHEALTH }}
          TT_TOKEN_OUTCURVEHEALTH2:     ${{ secrets.TT_TOKEN_OUTCURVEHEALTH2 }}
          TT_TOKEN_RAREFORM030:         ${{ secrets.TT_TOKEN_RAREFORM030 }}
          TT_TOKEN_STODDYCAREY06:       ${{ secrets.TT_TOKEN_STODDYCAREY06 }}
        run: node scripts/refresh-metrics.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/metrics.json)" ]; then
            git config user.name "rareform-bot"
            git config user.email "bot@rareform.local"
            git add data/metrics.json
            git commit -m "chore: refresh growth metrics"
            git push
          else
            echo "No metric changes to commit"
          fi
