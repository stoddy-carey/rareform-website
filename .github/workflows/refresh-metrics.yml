name: Refresh growth metrics

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh metrics.json
        env:
          # Apify — single token covers all actors. Optional actor overrides
          # if you want to swap to different scrapers later.
          APIFY_TOKEN:                       ${{ secrets.APIFY_TOKEN }}
          APIFY_IG_ACTOR:                    ${{ vars.APIFY_IG_ACTOR }}      # optional, default apify/instagram-profile-scraper
          APIFY_TIKTOK_ACTOR:                ${{ vars.APIFY_TIKTOK_ACTOR }}  # optional, default clockworks/tiktok-scraper

          # Phantombuster — LinkedIn (company + personal profiles)
          PHANTOMBUSTER_API_KEY:             ${{ secrets.PHANTOMBUSTER_API_KEY }}
          PHANTOMBUSTER_LI_AGENT_ID:         ${{ secrets.PHANTOMBUSTER_LI_AGENT_ID }}
          PHANTOMBUSTER_LI_SESSION_COOKIE:   ${{ secrets.PHANTOMBUSTER_LI_SESSION_COOKIE }}
        run: node scripts/refresh-metrics.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data/metrics.json)" ]; then
            git config user.name "rareform-bot"
            git config user.email "bot@rareform.local"
            git add data/metrics.json
            git commit -m "chore: refresh growth metrics"
            git push
          else
            echo "No metric changes to commit"
          fi
